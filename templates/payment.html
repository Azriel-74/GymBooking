{% extends 'base.html' %}

{% block content %}
<section class="container form-section-v2">
    <div class="form-card-v2 slide-up">
        <h2>ELITE <span>PAYMENT</span></h2>
        <p>PAYMENT FOR: <strong>{{ item }}</strong></p>
        <p>SECURELY PROCESS YOUR TRANSACTION BELOW.</p>
        <hr class="neon-hr">
        <form method="POST">
            <div class="form-group-v2">
                <label for="card_number">Card Number</label>
                <input type="text" id="card_number" name="card_number" placeholder="XXXX XXXX XXXX XXXX" required>
            </div>
            <div class="form-row-v2">
                <div class="form-group-v2">
                    <label for="expiry">Expiry Date</label>
                    <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required>
                </div>
                <div class="form-group-v2">
                    <label for="cvv">CVV</label>
                    <input type="text" id="cvv" name="cvv" placeholder="XXX" required>
                </div>
            </div>
            <button type="submit" class="btn-neon btn-block">Complete Payment</button>
        </form>
    </div>
</section>
{% endblock %}
