{% extends 'base.html' %}

{% block content %}
<section class="container form-section-v2">
    <div class="form-card-v2 slide-up">
        <h2>ELITE <span>BOOKING</span></h2>
        <p>BOOKING FOR: <strong>{{ gym_class.name }}</strong></p>
        <p>TIME: <strong>{{ gym_class.time }}</strong></p>
        <p>INSTRUCTOR: <strong>{{ gym_class.instructor }}</strong></p>
        <hr class="neon-hr">
        <form method="POST">
            <div class="form-group-v2">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group-v2">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
            </div>
            <button type="submit" class="btn-neon btn-block">Confirm Booking & Pay</button>
        </form>
    </div>
</section>
{% endblock %}
